databases:
  - name: sparse-kuiper-db
    databaseName: sparse_kuiper
    user: sparse_kuiper_user
    plan: free

services:
  - type: web
    name: sparse-kuiper-backend
    runtime: python
    rootDir: .
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sparse-kuiper-db
          property: connectionString
